<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment — BARICRYSTAL INTERNATIONAL</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.auth-required {
  text-align: center;
  padding: 60px 40px;
  max-width: 500px;
}

.auth-required h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  font-weight: 500;
  margin-bottom: 16px;
}

.auth-required p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 32px;
}

.auth-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 14px 32px;
  text-decoration: none;
  transition: all 0.2s;
  font-weight: 500;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.btn-primary {
  background: var(--gold);
  color: var(--dark);
}

.btn-primary:hover { opacity: 0.85; }

.btn-secondary {
  border: 1px solid var(--border);
  color: var(--text);
  background: transparent;
}

.btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

.pay-page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 100px 48px 100px;
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 80px;
  align-items: start;
}

/* ... rest of payment styling (keep existing payment.html styles) ... */
</style>
</head>
<body>

<!-- AUTH CHECK WILL INSERT THIS BEFORE SHOWING PAYMENT FORM -->
<div id="auth-check">
  <div class="auth-required">
    <h1>Sign In Required</h1>
    <p>You need to be logged in to complete your payment. If you don't have an account yet, create one to get started.</p>
    <div class="auth-buttons">
      <a href="login.html" class="btn btn-primary">Sign In</a>
      <a href="signup.html" class="btn btn-secondary">Create Account</a>
    </div>
  </div>
</div>

<!-- PAYMENT FORM WILL LOAD HERE IF USER IS AUTHENTICATED -->
<div id="payment-form" style="display:none;">
  <!-- Payment page content goes here -->
</div>

<script type="module">
import { auth, baseUrl } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  const authCheck = document.getElementById('auth-check');
  const paymentForm = document.getElementById('payment-form');

  if (!user || !user.emailVerified) {
    // Not authenticated — show login prompt
    authCheck.style.display = 'block';
    paymentForm.style.display = 'none';
    return;
  }

  // User is authenticated — hide login prompt and load payment form
  authCheck.style.display = 'none';
  paymentForm.style.display = 'block';

  // TODO: Load actual payment form content here
  // This can be injected dynamically or you can merge both into one file
});
</script>

</body>
</html>
