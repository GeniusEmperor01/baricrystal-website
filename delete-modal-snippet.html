<!-- Replace the existing DELETE ACCOUNT MODAL in dashboard.html with this -->

<div class="modal" id="delete-modal">
  <div class="modal-content">
    <div class="modal-title">Delete Account?</div>
    <div class="modal-text">
      This will permanently delete your account and all associated data. This action cannot be undone.<br><br>
      Enter your password to confirm.
    </div>
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;">Your Password</label>
      <input type="password" id="delete-password-input" placeholder="Enter your password"
        style="width: 100%; background: var(--dark-3); border: 1px solid var(--border-subtle);
               padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
               font-size: 13px; outline: none; box-sizing: border-box;" />
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="window.closeDeleteModal()">Cancel</button>
      <button class="modal-btn modal-confirm" onclick="window.confirmDelete()">Delete My Account</button>
    </div>
  </div>
</div>
